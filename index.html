<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clock</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="clock">
      <div class="number">1</div>
      <div class="number">2</div>
      <div class="number">3</div>
      <div class="number">4</div>
      <div class="number">5</div>
      <div class="number">6</div>
      <div class="number">7</div>
      <div class="number">8</div>
      <div class="number">9</div>
      <div class="number">10</div>
      <div class="number">11</div>
      <div class="number">12</div>
      <div class="handle handle__base"></div>
      <div class="handle handle__second"></div>
      <div class="handle handle__minute"></div>
      <div class="handle handle__hour"></div>
      <div class="dial__milliseconds">
        <div class="milliseconds__marker marker__1">
            <div class="marker__main"></div>
        </div>
        <div class="milliseconds__marker marker__2">
            <div class="marker__secondary"></div>
        </div>
        <div class="milliseconds__marker marker__3">
            <div class="marker__main"></div>
        </div>
        <div class="milliseconds__marker marker__4">
            <div class="marker__secondary"></div>
        </div>
        <div class="milliseconds__marker marker__5">
            <div class="marker__main"></div>
        </div>
        <div class="milliseconds__marker marker__6">
            <div class="marker__secondary"></div>
        </div>
        <div class="milliseconds__marker marker__7">
            <div class="marker__main"></div>
        </div>
        <div class="milliseconds__marker marker__8">
            <div class="marker__secondary"></div>
        </div>
        <div class="handle__milliseconds"></div>
        <div class="handle__milliseconds--base"></div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
